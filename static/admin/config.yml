backend:
  name: github
  repo: technologytasks/iTerra-Hugo-Website  # Replace with your GitHub repo
  branch: main

media_folder: "static/images"   # Where uploaded images will go
public_folder: "/images"

media_library:
  name: uploadcare   # Decap CMS default; can also use "local"

collections:

  # ── HOMEPAGE ───────────────────────────────────────────────
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "content/_index.md"
        fields:                # Must be an array
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow text", name: "eyebrow", widget: "string" }
              - { label: "Main title (HTML allowed)", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }

  # ── TEAM ───────────────────────────────────────────────────
  - name: "team"
    label: "Team Members"
    files:
      - name: "team"
        label: "Team YAML"
        file: "data/team.yaml"
        fields:
          - label: "Team Members"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Title", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }

  # ── PRODUCTS ───────────────────────────────────────────────
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Products YAML"
        file: "data/products.yaml"
        fields:
          - label: "Products"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Capacity", name: "capacity", widget: "string" }
              - { label: "Temperature", name: "temp", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Status", name: "status", widget: "select", options: ["Field trial", "Scaling", "Development", "Roadmap"] }

  # ── PARTNERS ──────────────────────────────────────────────
  - name: "partners"
    label: "Partners"
    files:
      - name: "partners"
        label: "Partners YAML"
        file: "data/partners.yaml"
        fields:
          - label: "Partners"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }