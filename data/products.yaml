- name: "ThermoVolt Geyser"
  subtitle: "Class I · Residential"
  capacity: "12 kWh"
  temp: "Up to 200°C"
  description: "Drop-in replacement for gas geysers. Charges from solar surplus. No inverter required."
  status: "Field trial"

- name: "ThermoVolt SME"
  subtitle: "Class II · Commercial"
  capacity: "50–500 kWh"
  temp: "Up to 500°C"
  description: "Process heat for small and medium industry — bakeries, dairies, food processing."
  status: "Development"

- name: "ThermoVolt Industrial"
  subtitle: "Class III · Industrial"
  capacity: "1–10 MWh"
  temp: "Up to 1,050°C"
  description: "High-temperature process heat for ceramics, glass, textiles and heavy industry."
  status: "Roadmap"
