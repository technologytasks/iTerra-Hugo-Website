<section class="contact-section" id="contact">
  <div class="section-eyebrow">{{ .Params.contact.eyebrow }}</div>
  <h2 class="contact-title">iTerra welcomes development agencies, institutional investors, and Pakistani industrial partners.</h2>
  <p class="contact-sub">{{ .Params.contact.email }} · Dr. Reto Stocker</p>
  <a class="contact-btn" href="mailto:{{ .Params.contact.email }}">Get in Touch</a>
  <div class="contact-locations">
    <span>🇨🇭 {{ .Params.contact.address_ch }}</span>
    <span>🇵🇰 {{ .Params.contact.address_pak }}</span>
  </div>
</section>
